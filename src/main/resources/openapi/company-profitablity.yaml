openapi: 3.0.0
info:
  title: Company Profitability API
  description: API to retrieve profitability information for a company
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /companies:
    get:
      summary: Get all companies
      operationId: getCompanies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
    post:
      summary: Create a company
      operationId: createCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompany'
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'

  /companies/{cvr}:
    get:
      summary: Get company by CVR
      operationId: getCompanyByCvr
      parameters:
        - name: cvr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        "404":
          description: Company not found
  /companies/{cvr}/profitability:
    get:
      operationId: getCompanyProfitabilityByCvr
      summary: Retrieve profitability for a company
      description: Returns profitability metrics for a given company
      parameters:
        - name: cvr
          in: path
          description: CVR of the company
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profitability'
        '400':
          description: Invalid request
        '404':
          description: Company not found
  /owners:
    get:
      summary: Get all owners
      operationId: getOwners
      responses:
        "200":
          description: List of owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Owner'
    post:
      summary: Create owner
      operationId: createOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOwner'
      responses:
        "201":
          description: Owner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
components:
  schemas:
    Address:
      type: object
      required:
        - street
        - city
        - postalCode
      properties:
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
    Owner:
      type: object
      required:
        - name
        - cpr
        - address
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        cpr:
          type: string
          description: Danish CPR number
        address:
          $ref: '#/components/schemas/Address'
    CreateOwner:
      type: object
      required:
        - name
        - cpr
        - address
      properties:
        name:
          type: string
        cpr:
          type: string
        address:
          $ref: '#/components/schemas/Address'
    Company:
      type: object
      required:
        - cvr
        - address
        - phoneNumber
        - profitability
      properties:
        id:
          type: integer
          format: int64
        cvr:
          type: string
          description: Danish company CVR number
        address:
          $ref: '#/components/schemas/Address'
        phoneNumber:
          type: string
        profitability:
          $ref: '#/components/schemas/Profitability'
        owners:
          type: array
          items:
            $ref: '#/components/schemas/Owner'
    CreateCompany:
      type: object
      required:
        - cvr
        - address
        - phoneNumber
        - profitability
      properties:
        cvr:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        phoneNumber:
          type: string
        profitability:
          $ref: '#/components/schemas/Profitability'
        owners:
          type: array
          items:
            $ref: '#/components/schemas/CreateOwner'
    Profitability:
      type: object
      properties:
        # cvr:
        #  type: string
        #  description: CVR of the company
        revenue:
          type: number
          format: double
          description: Total revenue of the company
        expenses:
          type: number
          format: double
          description: Total expenses of the company
        net_profit:
          type: number
          format: double
          description: Net profit of the company